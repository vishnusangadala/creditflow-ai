# CreditFlow AI — full local stack.
#   docker compose up --build
# Requires an OPENAI_API_KEY in a sibling .env file (see .env.example).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: creditflow
      POSTGRES_USER: creditflow
      POSTGRES_PASSWORD: creditflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent-service:
    build: ./agent-service
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-creditflow-ai}
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      agent-service:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/creditflow
      DB_USERNAME: creditflow
      DB_PASSWORD: creditflow
      AGENT_SERVICE_URL: http://agent-service:8000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      UPLOAD_DIR: /data/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads:/data/uploads

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"   # open http://localhost:3000

volumes:
  pgdata:
  uploads:
