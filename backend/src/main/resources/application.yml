spring:
  application:
    name: creditflow-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/creditflow}
    username: ${DB_USERNAME:creditflow}
    password: ${DB_PASSWORD:creditflow}
  jpa:
    hibernate:
      ddl-auto: validate   # schema is owned by Flyway, never by Hibernate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 100MB

server:
  port: ${BACKEND_PORT:8080}

# CreditFlow-specific configuration
creditflow:
  agent-service:
    base-url: ${AGENT_SERVICE_URL:http://localhost:8000}
    # The synchronous /run call can take a while on large documents.
    timeout-seconds: ${AGENT_TIMEOUT_SECONDS:180}
  storage:
    upload-dir: ${UPLOAD_DIR:./data/uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  governance:
    # When true, COMPLETED workflows with HIGH risk still require a human sign-off.
    require-review-on-high-risk: ${REQUIRE_REVIEW_ON_HIGH_RISK:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.creditflow: INFO
